<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0c447c"/>
<title>발성 트레이너 v2.0</title>
<style>
:root{
  --bg:#f5f5f0; --surface:#fff; --surface2:#e8e8e2;
  --text1:#1a1a18; --text2:#6f6e69; --text3:#b4b2a9;
  --accent:#0c447c; --success:#1D9E75; --warning:#EF9F27; --danger:#E24B4A;
  --wkey:#fff; --wkey-line:#d8d8d2; --bkey:#2a2a28;
}
@media(prefers-color-scheme:dark){
  :root{ --bg:#1c1c1a; --surface:#282825; --surface2:#2c2c2a;
         --text1:#f1efe8; --text2:#b4b2a9; --text3:#5f5e5a;
         --wkey:#3a3a37; --wkey-line:#222; --bkey:#0d0d0c; }
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:var(--bg);color:var(--text1);min-height:100vh;
  -webkit-tap-highlight-color:transparent;
}
#app{max-width:560px;margin:0 auto;padding:1rem 1rem 2rem;
     display:flex;flex-direction:column;min-height:100vh;}

/* 인트로 */
#intro{flex:1;display:flex;flex-direction:column;justify-content:center;
       align-items:center;text-align:center;gap:1rem;}
#intro h1{font-size:24px;font-weight:600;}
#intro p{font-size:15px;color:var(--text2);line-height:1.8;}
.primary-btn{font-size:16px;font-weight:500;padding:14px 28px;border-radius:14px;
  border:none;background:var(--accent);color:#fff;cursor:pointer;}
#mic-error{color:var(--danger);font-size:13px;margin-top:0.5rem;}
.version-tag{position:fixed;bottom:6px;right:8px;font-size:10px;color:var(--text3);z-index:50;}

#main{display:none;flex-direction:column;gap:0.75rem;}

/* 튜너 영역 */
.tuner{
  background:var(--surface);border-radius:18px;padding:1rem;
  border:1px solid var(--surface2);
}
.tuner-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;}
.tuner-label{font-size:12px;color:var(--text2);}
#live-note{font-size:40px;font-weight:300;line-height:1;}
#live-note .oct{font-size:18px;color:var(--text3);}
#live-cents{font-size:14px;color:var(--text2);min-height:18px;}
/* 튜너 미니 미터 */
.meter{position:relative;height:36px;margin-top:0.5rem;background:var(--surface2);border-radius:10px;overflow:hidden;}
.meter-center{position:absolute;left:50%;top:0;bottom:0;width:2px;background:var(--text3);opacity:0.6;}
.meter-zone{position:absolute;top:0;bottom:0;left:calc(50% - 15%);width:30%;background:var(--success);opacity:0.12;}
#meter-needle{position:absolute;top:4px;bottom:4px;width:6px;border-radius:3px;
  background:var(--text2);left:50%;transform:translateX(-50%);transition:left .08s,background .08s;}

/* 목표 / 채점 영역 */
.target-card{
  background:var(--surface);border-radius:18px;padding:1rem;
  border:1px solid var(--surface2);text-align:center;
}
#target-headline{font-size:13px;color:var(--text2);margin-bottom:0.25rem;}
#target-note{font-size:30px;font-weight:400;}
#target-note .oct{font-size:15px;color:var(--text3);}
#target-sub{font-size:13px;color:var(--text3);margin-top:2px;min-height:18px;}

#hold-bar-wrap{height:26px;background:var(--surface2);border-radius:13px;overflow:hidden;
  position:relative;margin-top:0.75rem;}
#hold-bar{height:100%;width:0%;background:var(--success);transition:width .1s linear;border-radius:13px;}
#hold-bar-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;color:var(--text1);}

#stability-line{font-size:12px;color:var(--text3);margin-top:0.5rem;min-height:16px;}

/* 설정 바 */
.settings{display:flex;align-items:center;gap:0.75rem;
  background:var(--surface);border-radius:14px;padding:0.6rem 0.9rem;border:1px solid var(--surface2);}
.settings label{font-size:12px;color:var(--text2);white-space:nowrap;}
#hold-time{flex:1;}
#hold-time-val{font-size:13px;font-weight:600;min-width:42px;text-align:right;}

/* 건반 */
.kb-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:14px;
  border:1px solid var(--surface2);background:var(--surface2);}
.keyboard{position:relative;height:150px;display:flex;width:max-content;}
.wkey{
  position:relative;width:46px;height:150px;background:var(--wkey);
  border-right:1px solid var(--wkey-line);cursor:pointer;
  display:flex;flex-direction:column;justify-content:flex-end;align-items:center;
  padding-bottom:8px;user-select:none;
}
.wkey:active,.wkey.pressed{background:var(--accent);color:#fff;}
.wkey.target{background:var(--warning);color:#fff;}
.wkey .solf{font-size:12px;font-weight:600;pointer-events:none;}
.wkey .lett{font-size:9px;color:var(--text3);pointer-events:none;}
.wkey.pressed .lett,.wkey.target .lett{color:rgba(255,255,255,0.7);}
.bkey{
  position:absolute;width:30px;height:95px;background:var(--bkey);
  border-radius:0 0 5px 5px;z-index:2;cursor:pointer;user-select:none;
  display:flex;justify-content:center;align-items:flex-end;padding-bottom:6px;
}
.bkey:active,.bkey.pressed{background:var(--accent);}
.bkey.target{background:var(--warning);}
.bkey .lett{font-size:8px;color:rgba(255,255,255,0.6);pointer-events:none;}

.controls{display:flex;gap:8px;justify-content:center;}
.controls button{font-size:13px;padding:9px 14px;border-radius:10px;
  border:1px solid var(--surface2);background:var(--surface);color:var(--text1);cursor:pointer;}
.controls button:active{transform:scale(.97);}

.hint{font-size:12px;color:var(--text3);text-align:center;line-height:1.6;}
</style>
</head>
<body>
<div class="version-tag">v2.0</div>
<div id="app">

  <div id="intro">
    <h1>🎤 발성 트레이너</h1>
    <p>건반에서 음을 누르면 그 음이 재생됩니다.<br>
    그 음을 따라 내어 <b>정확한 피치로 안정되게</b><br>유지하는 연습을 합니다.<br><br>
    상단 튜너는 지금 내는 음을 항상 보여줍니다.</p>
    <button class="primary-btn" id="start-btn">시작하기 (마이크 권한 허용)</button>
    <p id="mic-error"></p>
  </div>

  <div id="main">
    <!-- 튜너 -->
    <div class="tuner">
      <div class="tuner-top">
        <span class="tuner-label">🎙 지금 내 소리</span>
        <span id="live-cents">—</span>
      </div>
      <div id="live-note">—</div>
      <div class="meter">
        <div class="meter-zone"></div>
        <div class="meter-center"></div>
        <div id="meter-needle"></div>
      </div>
    </div>

    <!-- 목표 / 채점 -->
    <div class="target-card">
      <div id="target-headline">목표음 — 건반을 눌러 선택하세요</div>
      <div id="target-note">—</div>
      <div id="target-sub"></div>
      <div id="hold-bar-wrap">
        <div id="hold-bar"></div>
        <div id="hold-bar-text"></div>
      </div>
      <div id="stability-line"></div>
    </div>

    <!-- 설정 -->
    <div class="settings">
      <label>유지 시간</label>
      <input type="range" id="hold-time" min="1" max="15" step="1" value="4"/>
      <span id="hold-time-val">4초</span>
    </div>

    <!-- 건반 -->
    <div class="kb-wrap" id="kb-wrap">
      <div class="keyboard" id="keyboard"></div>
    </div>

    <div class="controls">
      <button id="replay-btn">▶ 목표음 다시 듣기</button>
      <button id="clear-btn">✕ 목표 해제</button>
    </div>

    <p class="hint">고음(A5 등)을 연습하려면 건반을 오른쪽으로 스크롤하세요.<br>
    허용 오차는 ±15센트입니다.</p>
  </div>
</div>

<script>
// ───────────────── 설정값 ─────────────────
const A4=440
const CENT_TOL=15            // 허용 오차 (고정)
const KB_LOW=48             // C3
const KB_HIGH=84            // C6
let HOLD_SECONDS=4          // 유지 시간 (슬라이더로 변경)
const FAIL_GRACE=0.4        // 살짝 흔들림 허용 시간

const SOLFEGE={0:'도',1:'도#',2:'레',3:'레#',4:'미',5:'파',6:'파#',7:'솔',8:'솔#',9:'라',10:'라#',11:'시'}
const LETTERS=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B']
const isBlack=(m)=>[1,3,6,8,10].includes(((m%12)+12)%12)

function noteFreq(m){ return A4*Math.pow(2,(m-69)/12) }
function solName(m){ return SOLFEGE[((m%12)+12)%12] }
function letterName(m){ return LETTERS[((m%12)+12)%12]+(Math.floor(m/12)-1) }
function centsDiff(f,t){ return 1200*Math.log2(f/t) }
function freqToMidiFloat(f){ return 69+12*Math.log2(f/A4) }

// ───────────────── 피치 감지 ─────────────────
function autoCorrelate(buf,sr){
  let rms=0
  for(let i=0;i<buf.length;i++) rms+=buf[i]*buf[i]
  rms=Math.sqrt(rms/buf.length)
  if(rms<0.006) return -1
  const SIZE=buf.length
  let r1=0,r2=SIZE-1
  for(let i=0;i<SIZE/2;i++){ if(Math.abs(buf[i])<0.2){r1=i;break} }
  for(let i=1;i<SIZE/2;i++){ if(Math.abs(buf[SIZE-i])<0.2){r2=SIZE-i;break} }
  const s=buf.slice(r1,r2),n=s.length
  if(n<2) return -1
  const c=new Float32Array(n)
  for(let i=0;i<n;i++) for(let j=0;j<n-i;j++) c[i]+=s[j]*s[j+i]
  let d=0
  while(d<n-1 && c[d]>c[d+1]) d++
  let mv=-1,mp=-1
  for(let i=d;i<n;i++) if(c[i]>mv){mv=c[i];mp=i}
  if(mp<=0) return -1
  const x1=c[mp-1]||0,x2=c[mp],x3=c[mp+1]||0
  const a=(x1+x3-2*x2)/2,b=(x3-x1)/2
  let T=mp
  if(a) T=mp-b/(2*a)
  return T>0 ? sr/T : -1
}

// ───────────────── 오디오 ─────────────────
let audioCtx=null,analyser=null,mediaStream=null
function getCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)()
  if(audioCtx.state==='suspended') audioCtx.resume()
  return audioCtx
}
function playNote(m,dur=1.5){
  const ctx=getCtx()
  const freq=noteFreq(m)
  const gain=ctx.createGain()
  const t=ctx.currentTime
  gain.gain.setValueAtTime(0,t)
  gain.gain.linearRampToValueAtTime(0.8,t+0.06)
  gain.gain.setValueAtTime(0.8,t+dur-0.12)
  gain.gain.linearRampToValueAtTime(0,t+dur)
  gain.connect(ctx.destination)
  const harmonics=[{f:1,v:1},{f:2,v:0.4},{f:3,v:0.18},{f:4,v:0.08}]
  harmonics.forEach(({f,v})=>{
    const osc=ctx.createOscillator()
    const g=ctx.createGain()
    osc.type='sine';osc.frequency.value=freq*f;g.gain.value=v
    osc.connect(g);g.connect(gain)
    osc.start(t);osc.stop(t+dur)
  })
}
function playSuccess(){
  const ctx=getCtx();const t=ctx.currentTime
  const gain=ctx.createGain()
  gain.gain.setValueAtTime(0.35,t)
  gain.gain.linearRampToValueAtTime(0,t+0.5)
  gain.connect(ctx.destination)
  ;[523,659,784].forEach((fr,i)=>{
    const osc=ctx.createOscillator()
    osc.type='sine';osc.frequency.value=fr
    osc.connect(gain);osc.start(t+i*0.08);osc.stop(t+0.5)
  })
}
async function startMic(){
  const ctx=getCtx()
  mediaStream=await navigator.mediaDevices.getUserMedia({
    audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}
  })
  const src=ctx.createMediaStreamSource(mediaStream)
  analyser=ctx.createAnalyser()
  analyser.fftSize=2048
  src.connect(analyser)
}

// ───────────────── 상태 ─────────────────
let targetMidi=null
let holdAccum=0
let offGrace=0
let lastFrameTime=0
let recentCents=[]   // 안정성 측정용 (최근 cents 값들)
let succeeded=false

function $(id){return document.getElementById(id)}

// ───────────────── 건반 생성 ─────────────────
function buildKeyboard(){
  const kb=$('keyboard')
  kb.innerHTML=''
  // 흰건반 먼저 배치
  const whiteKeys=[]
  for(let m=KB_LOW;m<=KB_HIGH;m++){
    if(!isBlack(m)) whiteKeys.push(m)
  }
  const wWidth=46
  whiteKeys.forEach((m,i)=>{
    const el=document.createElement('div')
    el.className='wkey'
    el.dataset.midi=m
    el.innerHTML=`<span class="solf">${solName(m)}</span><span class="lett">${letterName(m)}</span>`
    el.addEventListener('click',()=>selectTarget(m))
    kb.appendChild(el)
  })
  // 검은건반 배치 (흰건반 사이)
  let wi=0
  for(let m=KB_LOW;m<=KB_HIGH;m++){
    if(isBlack(m)){
      const el=document.createElement('div')
      el.className='bkey'
      el.dataset.midi=m
      el.style.left=(wi*wWidth - 15)+'px'
      el.innerHTML=`<span class="lett">${letterName(m)}</span>`
      el.addEventListener('click',(e)=>{e.stopPropagation();selectTarget(m)})
      kb.appendChild(el)
    } else {
      wi++
    }
  }
  // 키보드 전체 너비
  kb.style.width=(whiteKeys.length*wWidth)+'px'
}

function highlightKeys(){
  document.querySelectorAll('.wkey,.bkey').forEach(el=>{
    el.classList.toggle('target', Number(el.dataset.midi)===targetMidi)
  })
}

// ───────────────── 목표 선택 ─────────────────
function selectTarget(m){
  targetMidi=m
  holdAccum=0;offGrace=0;succeeded=false;recentCents=[]
  $('target-headline').textContent='목표음'
  $('target-note').innerHTML=`${solName(m)} <span class="oct">${letterName(m)}</span>`
  $('target-sub').textContent=`${noteFreq(m).toFixed(1)} Hz · 이 음을 따라 내세요`
  $('hold-bar').style.width='0%'
  $('hold-bar').style.background='var(--success)'
  $('hold-bar-text').textContent=`${HOLD_SECONDS}초 유지 목표`
  $('stability-line').textContent=''
  highlightKeys()
  playNote(m,1.5)
  lastFrameTime=performance.now()
}

function clearTarget(){
  targetMidi=null
  $('target-headline').textContent='목표음 — 건반을 눌러 선택하세요'
  $('target-note').textContent='—'
  $('target-sub').textContent=''
  $('hold-bar').style.width='0%'
  $('hold-bar-text').textContent=''
  $('stability-line').textContent=''
  highlightKeys()
}

// ───────────────── 메인 루프 ─────────────────
function loop(){
  const now=performance.now()
  const dt=(now-lastFrameTime)/1000
  lastFrameTime=now

  let liveFreq=-1
  if(analyser){
    const buf=new Float32Array(analyser.fftSize)
    analyser.getFloatTimeDomainData(buf)
    liveFreq=autoCorrelate(buf,audioCtx.sampleRate)
  }

  // ── 튜너 표시 (항상) ──
  if(liveFreq>40 && liveFreq<2000){
    const mf=freqToMidiFloat(liveFreq)
    const nearest=Math.round(mf)
    const off=(mf-nearest)*100
    $('live-note').innerHTML=`${solName(nearest)} <span class="oct">${letterName(nearest)}</span>`
    $('live-cents').textContent=`${off>0?'+':''}${Math.round(off)}c`
    // 미터 (가장 가까운 음 기준 ±50c)
    const pct=50+Math.max(-50,Math.min(50,off))
    const needle=$('meter-needle')
    needle.style.left=pct+'%'
    needle.style.background=Math.abs(off)<CENT_TOL?'var(--success)':Math.abs(off)<30?'var(--warning)':'var(--danger)'
  } else {
    $('live-note').textContent='—'
    $('live-cents').textContent='소리를 내보세요'
    $('meter-needle').style.left='50%'
    $('meter-needle').style.background='var(--text2)'
  }

  // ── 목표음 채점 ──
  if(targetMidi!==null && !succeeded && liveFreq>40 && liveFreq<2000){
    const target=noteFreq(targetMidi)
    const cents=centsDiff(liveFreq,target)
    const onPitch=Math.abs(cents)<CENT_TOL

    // 안정성: 최근 1.5초 윈도우
    recentCents.push({t:now,c:cents})
    recentCents=recentCents.filter(x=>now-x.t<1500)

    if(onPitch){
      holdAccum+=dt;offGrace=0
    } else {
      offGrace+=dt
      if(offGrace>FAIL_GRACE) holdAccum=Math.max(0,holdAccum-dt*0.6)
    }

    // 근접도 안내 (목표에서 멀면)
    const semitoneOff=Math.round(freqToMidiFloat(liveFreq))-targetMidi
    let sub=''
    if(Math.abs(cents)<CENT_TOL){
      sub='✓ 정확해요! 유지하세요'
    } else if(Math.abs(semitoneOff)>=1){
      const absSt=Math.abs(semitoneOff)
      sub=(semitoneOff>0?'너무 높아요 ':'너무 낮아요 ')+`(${absSt}반음 차이)`
    } else {
      sub=cents>0?'↓ 살짝 낮춰보세요':'↑ 살짝 올려보세요'
    }
    $('target-sub').textContent=sub

    // 유지 바
    const pct=Math.min(100,(holdAccum/HOLD_SECONDS)*100)
    $('hold-bar').style.width=pct+'%'
    $('hold-bar-text').textContent=`${Math.max(0,HOLD_SECONDS-holdAccum).toFixed(1)}초 남음`

    // 안정성 표시 (표준편차 근사: 최대-최소 폭)
    if(recentCents.length>5){
      const vals=recentCents.map(x=>x.c)
      const spread=Math.max(...vals)-Math.min(...vals)
      $('stability-line').textContent=`흔들림 폭: ±${Math.round(spread/2)}c ${spread<20?'(안정적 👍)':spread<40?'(보통)':'(불안정)'}`
    }

    if(holdAccum>=HOLD_SECONDS){
      succeeded=true
      $('hold-bar').style.width='100%'
      $('hold-bar-text').textContent='성공! 🎉'
      $('target-sub').textContent='훌륭해요! 다른 음을 연습하거나 다시 도전하세요'
      playSuccess()
    }
  }

  requestAnimationFrame(loop)
}

// ───────────────── 이벤트 ─────────────────
$('start-btn').addEventListener('click',async()=>{
  try{
    getCtx();await startMic()
    $('intro').style.display='none'
    $('main').style.display='flex'
    buildKeyboard()
    lastFrameTime=performance.now()
    requestAnimationFrame(loop)
  }catch(e){
    $('mic-error').textContent='마이크 권한이 필요합니다: '+e.message
  }
})
$('hold-time').addEventListener('input',(e)=>{
  HOLD_SECONDS=Number(e.target.value)
  $('hold-time-val').textContent=HOLD_SECONDS+'초'
  if(targetMidi!==null && !succeeded){
    holdAccum=0
    $('hold-bar-text').textContent=`${HOLD_SECONDS}초 유지 목표`
  }
})
$('replay-btn').addEventListener('click',()=>{ if(targetMidi!==null) playNote(targetMidi,1.5) })
$('clear-btn').addEventListener('click',clearTarget)
</script>
</body>
</html>
