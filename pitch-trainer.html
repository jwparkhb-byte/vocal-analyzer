<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0c447c"/>
<title>음정 트레이너</title>
<style>
  :root {
    --bg: #f5f5f0;
    --surface: #ffffff;
    --surface2: #ebebE5;
    --text1: #1a1a18;
    --text2: #6f6e69;
    --text3: #b4b2a9;
    --accent: #0c447c;
    --success: #1D9E75;
    --warning: #EF9F27;
    --danger: #E24B4A;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --surface: #282825; --surface2: #2c2c2a;
      --text1: #f1efe8; --text2: #b4b2a9; --text3: #5f5e5a;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: var(--bg); color: var(--text1);
    min-height: 100vh; -webkit-tap-highlight-color: transparent;
  }
  #app {
    max-width: 480px; margin: 0 auto;
    padding: 1.5rem 1.25rem 3rem;
    display: flex; flex-direction: column; min-height: 100vh;
  }

  /* 인트로 화면 */
  #intro {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; align-items: center; text-align: center; gap: 1rem;
  }
  #intro h1 { font-size: 22px; font-weight: 600; }
  #intro p { font-size: 15px; color: var(--text2); line-height: 1.7; }
  #start-btn {
    margin-top: 0.5rem; font-size: 16px; font-weight: 500;
    padding: 14px 28px; border-radius: 14px; border: none;
    background: var(--accent); color: white; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #mic-error { color: var(--danger); font-size: 13px; margin-top: 0.5rem; }

  /* 트레이너 화면 */
  #trainer { display: none; flex-direction: column; gap: 0; }

  .lesson-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 0.75rem;
  }
  #lesson-name { font-size: 14px; font-weight: 500; }
  #lesson-count { font-size: 13px; color: var(--text2); }

  .progress-track {
    height: 4px; background: var(--surface2); border-radius: 2px;
    overflow: hidden; margin-bottom: 1.75rem;
  }
  #progress-fill {
    height: 100%; background: var(--accent);
    transition: width 0.35s ease; width: 0%;
  }

  .target-area { text-align: center; margin-bottom: 1.25rem; }
  .target-label { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
  #target-note { font-size: 52px; font-weight: 300; letter-spacing: -1px; line-height: 1; }
  #status-text {
    font-size: 14px; color: var(--text2); margin-top: 8px;
    min-height: 20px; transition: color 0.2s;
  }

  /* 그래프 + 링 */
  .graph-area { position: relative; margin-bottom: 0.5rem; }
  #pitch-canvas {
    width: 100%; height: 180px; display: block;
    border-radius: 16px; background: var(--surface2);
  }
  .graph-guide {
    position: absolute; left: 0; right: 0; pointer-events: none;
  }
  .guide-line {
    position: absolute; left: 0; right: 0; height: 1px;
    background: var(--text3);
  }
  .guide-line.center { top: 50%; opacity: 0.5; }
  .guide-line.upper { top: 25%; opacity: 0.25; }
  .guide-line.lower { top: 75%; opacity: 0.25; }
  .guide-label {
    position: absolute; left: 10px; font-size: 10px; color: var(--text3);
  }
  .guide-label.upper { top: 25%; transform: translateY(-50%); }
  .guide-label.lower { top: 75%; transform: translateY(-50%); }

  #hold-ring {
    position: absolute; top: 12px; right: 12px;
    width: 40px; height: 40px;
  }
  #hold-ring svg { position: absolute; top: 0; left: 0; }
  #ring-track { stroke: var(--text3); }
  #ring-fill {
    stroke: var(--success);
    stroke-dasharray: 100.5;
    stroke-dashoffset: 100.5;
    transition: stroke-dashoffset 0.1s linear;
    transform: rotate(-90deg);
    transform-origin: 20px 20px;
  }

  #step-indicator {
    text-align: center; font-size: 13px; color: var(--text3);
    margin: 0.5rem 0 1.5rem;
  }

  .controls {
    display: flex; gap: 8px; justify-content: center; margin-top: auto;
  }
  .controls button {
    font-size: 13px; padding: 10px 16px; border-radius: 10px;
    border: 1px solid var(--surface2); background: var(--surface);
    color: var(--text1); cursor: pointer;
  }
  .controls button:active { transform: scale(0.97); }

  /* done 화면 */
  #done-screen {
    display: none; flex: 1; flex-direction: column;
    justify-content: center; align-items: center; text-align: center; gap: 1rem;
  }
  #done-screen h2 { font-size: 22px; font-weight: 500; }
  #done-screen p { font-size: 15px; color: var(--text2); }
  #done-restart {
    font-size: 15px; padding: 12px 24px; border-radius: 12px;
    border: none; background: var(--accent); color: white; cursor: pointer;
  }
</style>
</head>
<body>
<div id="app">
  <!-- 인트로 -->
  <div id="intro">
    <h1>🎵 음정 트레이너</h1>
    <p>기준음을 듣고 그대로 따라 불러보세요.<br>
    마이크가 자동으로 음정을 분석하고,<br>
    정확히 맞추면 자동으로 다음 음으로 넘어갑니다.</p>
    <button id="start-btn">시작하기 (마이크 권한 허용)</button>
    <p id="mic-error"></p>
  </div>

  <!-- 트레이너 -->
  <div id="trainer">
    <div class="lesson-header">
      <span id="lesson-name">레슨 1</span>
      <span id="lesson-count">1 / 6</span>
    </div>
    <div class="progress-track">
      <div id="progress-fill"></div>
    </div>

    <div class="target-area">
      <p class="target-label">목표음</p>
      <p id="target-note">도</p>
      <p id="status-text">기준음 재생 중...</p>
    </div>

    <div class="graph-area">
      <canvas id="pitch-canvas"></canvas>
      <div class="graph-guide" style="top:0;bottom:0;">
        <div class="guide-line center"></div>
        <div class="guide-line upper"></div>
        <div class="guide-line lower"></div>
        <span class="guide-label upper">+50c</span>
        <span class="guide-label lower">−50c</span>
      </div>
      <div id="hold-ring">
        <svg width="40" height="40" viewBox="0 0 40 40">
          <circle id="ring-track" cx="20" cy="20" r="16" fill="none" stroke-width="3"/>
          <circle id="ring-fill" cx="20" cy="20" r="16" fill="none" stroke-width="3"/>
        </svg>
      </div>
    </div>

    <p id="step-indicator">1 / 3</p>

    <div class="controls">
      <button id="restart-btn">↩ 처음부터</button>
      <button id="replay-btn">▶ 기준음 다시 듣기</button>
    </div>
  </div>

  <!-- 완료 -->
  <div id="done-screen">
    <h2>🎉 모든 레슨 완료!</h2>
    <p>온음과 반음 전 단계를 마쳤습니다.<br>꾸준히 연습하면 음감이 늘 거예요!</p>
    <button id="done-restart">처음부터 다시</button>
  </div>
</div>

<script>
// ─── 상수 ────────────────────────────────────────────────────────────────────
const A4 = 440
const CENT_TOL = 25        // 허용 오차 (cents)
const HOLD_NEEDED = 20     // 연속 유지 프레임 수 (~0.33초)
const TONE_MS = 1100       // 기준음 재생 후 대기 시간
const HISTORY = 120        // 그래프 히스토리 길이

const SOLFEGE = { 0:'도', 2:'레', 4:'미', 5:'파', 7:'솔', 9:'라', 11:'시',
                  1:'도#', 3:'레#', 6:'파#', 8:'솔#', 10:'라#' }

const LESSONS = [
  { name:'온음: 도 → 레',          seq:[60,62,60] },
  { name:'온음: 도 → 레 → 미',     seq:[60,62,64,62,60] },
  { name:'온음: 도 → 레 → 미 → 파', seq:[60,62,64,65,64,62,60] },
  { name:'반음: 미 → 파',          seq:[64,65,64] },
  { name:'반음: 시 → 도',          seq:[71,72,71] },
  { name:'혼합: 도 → 레 → 미 → 파 → 솔', seq:[60,62,64,65,67,65,64,62,60] },
]

// ─── 상태 ────────────────────────────────────────────────────────────────────
let audioCtx = null
let analyser = null
let mediaStream = null
let rafId = null

let lessonIdx = 0
let stepIdx = 0
let holdFrames = 0
let waiting = false   // 기준음 재생 중 (마이크 분석 일시 정지)
let pitchHistory = [] // Array<number|null>

// ─── 유틸 ────────────────────────────────────────────────────────────────────
function noteFreq(midi) { return A4 * Math.pow(2, (midi - 69) / 12) }
function midiName(midi) { return SOLFEGE[((midi % 12) + 12) % 12] || '?' }
function centsDiff(f, target) { return 1200 * Math.log2(f / target) }

function autoCorrelate(buf, sr) {
  let rms = 0
  for (let i = 0; i < buf.length; i++) rms += buf[i] * buf[i]
  rms = Math.sqrt(rms / buf.length)
  if (rms < 0.008) return -1

  const SIZE = buf.length
  let r1 = 0, r2 = SIZE - 1
  for (let i = 0; i < SIZE / 2; i++) { if (Math.abs(buf[i]) < 0.2) { r1 = i; break } }
  for (let i = 1; i < SIZE / 2; i++) { if (Math.abs(buf[SIZE-i]) < 0.2) { r2 = SIZE-i; break } }
  const s = buf.slice(r1, r2)
  const n = s.length
  if (n < 2) return -1

  const c = new Float32Array(n)
  for (let i = 0; i < n; i++)
    for (let j = 0; j < n - i; j++) c[i] += s[j] * s[j+i]

  let d = 0
  while (d < n-1 && c[d] > c[d+1]) d++
  let maxV = -1, maxP = -1
  for (let i = d; i < n; i++) if (c[i] > maxV) { maxV = c[i]; maxP = i }
  if (maxP <= 0) return -1

  const x1 = c[maxP-1]||0, x2 = c[maxP], x3 = c[maxP+1]||0
  const a = (x1+x3-2*x2)/2, b = (x3-x1)/2
  let T = maxP
  if (a) T = maxP - b/(2*a)
  return T > 0 ? sr/T : -1
}

// ─── 오디오 ──────────────────────────────────────────────────────────────────
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
  if (audioCtx.state === 'suspended') audioCtx.resume()
  return audioCtx
}

function playNote(midi, dur = 1.0) {
  return new Promise(resolve => {
    const ctx = getCtx()
    const osc = ctx.createOscillator()
    const gain = ctx.createGain()
    osc.type = 'sine'
    osc.frequency.value = noteFreq(midi)
    const t = ctx.currentTime
    gain.gain.setValueAtTime(0, t)
    gain.gain.linearRampToValueAtTime(0.25, t + 0.05)
    gain.gain.setValueAtTime(0.25, t + dur - 0.1)
    gain.gain.linearRampToValueAtTime(0, t + dur)
    osc.connect(gain); gain.connect(ctx.destination)
    osc.start(); osc.stop(t + dur)
    osc.onended = resolve
  })
}

async function startMic() {
  const ctx = getCtx()
  mediaStream = await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
  })
  const src = ctx.createMediaStreamSource(mediaStream)
  analyser = ctx.createAnalyser()
  analyser.fftSize = 2048
  src.connect(analyser)
}

// ─── UI 업데이트 ──────────────────────────────────────────────────────────────
function updateHeader() {
  const lesson = LESSONS[lessonIdx]
  document.getElementById('lesson-name').textContent = lesson.name
  document.getElementById('lesson-count').textContent = `${lessonIdx+1} / ${LESSONS.length}`
  document.getElementById('step-indicator').textContent =
    `${stepIdx+1} / ${lesson.seq.length}`
  const pct = ((lessonIdx + stepIdx / lesson.seq.length) / LESSONS.length) * 100
  document.getElementById('progress-fill').style.width = pct + '%'
  document.getElementById('target-note').textContent = midiName(lesson.seq[stepIdx])
}

function setStatus(text, color) {
  const el = document.getElementById('status-text')
  el.textContent = text
  el.style.color = color || 'var(--text2)'
}

function updateHoldRing(progress) {
  const circ = 100.5
  document.getElementById('ring-fill').style.strokeDashoffset =
    Math.max(0, circ - progress * circ)
}

// ─── 그래프 ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('pitch-canvas')
const ctx2d = canvas.getContext('2d')

function drawGraph() {
  const dpr = window.devicePixelRatio || 1
  const w = canvas.clientWidth, h = canvas.clientHeight
  if (canvas.width !== w*dpr || canvas.height !== h*dpr) {
    canvas.width = w*dpr; canvas.height = h*dpr
  }
  ctx2d.setTransform(dpr,0,0,dpr,0,0)
  ctx2d.clearRect(0,0,w,h)

  const vis = pitchHistory.slice(-HISTORY)
  ctx2d.lineWidth = 2.5
  ctx2d.lineCap = 'round'
  ctx2d.lineJoin = 'round'
  ctx2d.beginPath()
  let started = false, lastC = null, lastX = 0, lastY = h/2

  for (let i = 0; i < vis.length; i++) {
    const c = vis[i]
    const x = (i / (HISTORY-1)) * w
    if (c === null || c === undefined) { started = false; continue }
    const clamped = Math.max(-50, Math.min(50, c))
    const y = h/2 - (clamped/50) * (h/2 - 10)
    if (!started) { ctx2d.moveTo(x,y); started = true }
    else ctx2d.lineTo(x,y)
    lastC = c; lastX = x; lastY = y
  }

  let color = 'rgba(150,150,150,0.5)'
  if (lastC !== null) {
    const a = Math.abs(lastC)
    color = a < CENT_TOL ? '#1D9E75' : a < CENT_TOL*1.8 ? '#EF9F27' : '#E24B4A'
  }
  ctx2d.strokeStyle = color
  ctx2d.stroke()

  if (lastC !== null) {
    ctx2d.beginPath()
    ctx2d.arc(lastX, lastY, 5, 0, Math.PI*2)
    ctx2d.fillStyle = color
    ctx2d.fill()
  }
}

// ─── 레슨 흐름 ───────────────────────────────────────────────────────────────
function playCurrentAndListen() {
  const midi = LESSONS[lessonIdx].seq[stepIdx]
  waiting = true
  holdFrames = 0
  pitchHistory = []
  updateHoldRing(0)
  setStatus('기준음 재생 중...')

  playNote(midi, 1.0)
  setTimeout(() => {
    waiting = false
    setStatus('이 음을 따라 내보세요')
  }, TONE_MS)
}

function advance() {
  const lesson = LESSONS[lessonIdx]
  if (stepIdx < lesson.seq.length - 1) {
    stepIdx++
  } else if (lessonIdx < LESSONS.length - 1) {
    lessonIdx++
    stepIdx = 0
  } else {
    // 전체 완료
    document.getElementById('trainer').style.display = 'none'
    document.getElementById('done-screen').style.display = 'flex'
    if (rafId) cancelAnimationFrame(rafId)
    return
  }
  updateHeader()
  playCurrentAndListen()
}

// ─── 메인 루프 ───────────────────────────────────────────────────────────────
function loop() {
  if (!waiting && analyser) {
    const buf = new Float32Array(analyser.fftSize)
    analyser.getFloatTimeDomainData(buf)
    const freq = autoCorrelate(buf, audioCtx.sampleRate)

    let cents = null
    if (freq > 60 && freq < 1500) {
      const target = noteFreq(LESSONS[lessonIdx].seq[stepIdx])
      cents = centsDiff(freq, target)
      const abs = Math.abs(cents)

      if (abs < CENT_TOL) {
        holdFrames++
        setStatus('정확해요! 유지하세요 ✓', 'var(--success)')
      } else {
        holdFrames = Math.max(0, holdFrames - 2)
        const dir = cents > 0 ? '살짝 낮춰보세요 ↓' : '살짝 올려보세요 ↑'
        setStatus(dir + `  (${Math.round(cents) > 0 ? '+' : ''}${Math.round(cents)}c)`)
      }

      updateHoldRing(Math.min(1, holdFrames / HOLD_NEEDED))

      if (holdFrames >= HOLD_NEEDED) {
        holdFrames = 0
        updateHoldRing(0)
        setStatus('✅ 성공!  다음 음으로...', 'var(--success)')
        setTimeout(advance, 500)
      }
    } else {
      holdFrames = Math.max(0, holdFrames - 1)
      updateHoldRing(Math.min(1, holdFrames / HOLD_NEEDED))
      if (!waiting) setStatus('소리를 내보세요 🎤')
    }

    pitchHistory.push(cents)
    if (pitchHistory.length > HISTORY * 2) pitchHistory.shift()
  }

  drawGraph()
  rafId = requestAnimationFrame(loop)
}

// ─── 버튼 이벤트 ─────────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', async () => {
  try {
    getCtx() // iOS: 반드시 사용자 탭 이후 생성
    await startMic()
    document.getElementById('intro').style.display = 'none'
    document.getElementById('trainer').style.display = 'flex'
    updateHeader()
    playCurrentAndListen()
    rafId = requestAnimationFrame(loop)
  } catch(e) {
    document.getElementById('mic-error').textContent =
      '마이크 권한이 필요합니다: ' + e.message
  }
})

document.getElementById('replay-btn').addEventListener('click', () => {
  if (!waiting) playCurrentAndListen()
})

document.getElementById('restart-btn').addEventListener('click', () => {
  lessonIdx = 0; stepIdx = 0
  updateHeader()
  playCurrentAndListen()
})

document.getElementById('done-restart').addEventListener('click', () => {
  lessonIdx = 0; stepIdx = 0
  document.getElementById('done-screen').style.display = 'none'
  document.getElementById('trainer').style.display = 'flex'
  updateHeader()
  playCurrentAndListen()
  if (!rafId) rafId = requestAnimationFrame(loop)
})
</script>
</body>
</html>
